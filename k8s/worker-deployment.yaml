apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: speechlyt
  labels:
    app: speechlyt
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speechlyt
      component: worker
  template:
    metadata:
      labels:
        app: speechlyt
        component: worker
    spec:
      containers:
        - name: worker
          image: speechlyt/worker:latest
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
