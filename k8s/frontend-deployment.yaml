apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: speechlyt
  labels:
    app: speechlyt
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speechlyt
      component: frontend
  template:
    metadata:
      labels:
        app: speechlyt
        component: frontend
    spec:
      containers:
        - name: frontend
          image: speechlyt/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:8000/api/v1"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: speechlyt
spec:
  selector:
    app: speechlyt
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
