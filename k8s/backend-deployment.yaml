apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: speechlyt
  labels:
    app: speechlyt
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: speechlyt
      component: backend
  template:
    metadata:
      labels:
        app: speechlyt
        component: backend
    spec:
      containers:
        - name: backend
          image: speechlyt/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: speechlyt
spec:
  selector:
    app: speechlyt
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
